ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ com.dailytracker.server.ApplicationKt.module ]
    }
}

jwt {
    secret = "daily-tracker-jwt-secret-change-in-production"
    secret = ${?JWT_SECRET}
    issuer = "dailytracker-server"
    audience = "dailytracker-client"
    realm = "DailyTracker"
}

database {
    url = "jdbc:postgresql://localhost:5432/dailytracker"
    url = ${?DATABASE_URL}
    user = "dailytracker"
    user = ${?DATABASE_USER}
    password = "dailytracker"
    password = ${?DATABASE_PASSWORD}
}
