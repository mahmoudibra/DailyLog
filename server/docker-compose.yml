services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dailytracker
      POSTGRES_USER: dailytracker
      POSTGRES_PASSWORD: dailytracker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/dailytracker
      DATABASE_USER: dailytracker
      DATABASE_PASSWORD: dailytracker
      JWT_SECRET: change-this-in-production
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
    depends_on:
      - postgres

volumes:
  pgdata:
  uploads:
